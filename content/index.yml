faq:
  title: Frequently Asked Questions
  description: Answers to common questions about my front-end development process and services.
  categories:
    - title: Services & Process
      questions:
        - label: What services do you offer?
          content: |
            I focus on modern front-end development using technologies like Vue.js, Nuxt.js, React, and TypeScript.
        - label: What does your development process look like?
          content: |
            Discovery & Requirements, UI/UX Review (Optional), Architecture Planning, Development, Testing, Deployment, Handover
        - label: Do you work with startups?
          content: |
            Absolutely! I  frequently collaborate with startups that need rapid iteration, clean UI, and scalable front-end architecture.
    - title: Pricing & Timelines
      questions:
        - label: How much does a project typically cost?
          content: |
            Small front-end features / fixes: $500–$1,500, Landing pages / marketing sites: $1,500–$5,000, Full web applications or dashboards: $6,000–$25,000+, Front-end consultation: $70–$120/hour or $600/day.
        - label: What are your payment terms?
          content: |
            40% deposit to book the project, 60% upon completion after final delivery.
        - label: How long does a typical project take?
          content: |
            Small tasks or fixes → 1–5 days, Landing page / small feature → 2–4 weeks, Complete web application → 2–4 months. A detailed timeline is provided after the initial discovery call.
        - label: Do you offer retainers or ongoing support?
          content: |
            Yes. For ongoing maintenance, new features, performance improvements, or continuous updates, I offer monthly retainer plans tailored to your needs.
    - title: About Me
      questions:
        - label: What do you enjoy most about front-end development?
          content: |
            I love turning ideas and designs into real, interactive experiences.
            Solving UI problems, optimizing performance, and creating clean component-based architectures is something I truly enjoy.
            Seeing users interact smoothly with something I built is the most rewarding part of the job.
        - label: What are your hobbies?
          content: |
            Outside of coding, I enjoy exploring new tech tools, photography, and staying active. I also enjoy learning new frameworks, contributing to open-source projects.
